name: HKU Room Booker

on:
  # Midnight HKT = 16:00 UTC
  schedule:
    - cron: '0 16 * * *'

  # Manual trigger: go to Actions -> HKU Room Booker -> Run workflow
  workflow_dispatch:
    inputs:
      action:
        description: 'What should this run do?'
        required: true
        default: 'book_now'
        type: choice
        options:
          - book_now
          - schedule_future
      date:
        description: 'Date to book (YYYY-MM-DD)'
        required: true
      time:
        description: 'Start time HH:MM (must be on the hour)'
        required: true
        default: '10:00'
      duration:
        description: 'Hours (1, 2, 3, or 4)'
        required: true
        default: '2'
      room_target:
        description: 'Room target'
        required: true
        default: 'all_study_rooms'
        type: choice
        options:
          - all_study_rooms
          - chi_wah_study_rooms
          - chi_wah_study_booths
          - discussion_rooms
          - single_study_rooms
          - study_tables
          - main_library_discussion_rooms
          - main_library_single_study_rooms
          - dental_discussion_rooms
          - law_discussion_rooms
          - medical_discussion_rooms
          - medical_single_study_rooms
          - music_discussion_rooms
      purpose:
        description: 'Booking purpose/description'
        required: true
        default: 'Study'
      dry_run:
        description: 'Test without submitting the final booking form'
        required: true
        default: false
        type: boolean

jobs:
  book:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit bookings.json status updates

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium
        run: playwright install chromium --with-deps

      # Scheduled run: reads bookings.json for tomorrow's entries.
      - name: Book scheduled entries
        id: scheduled
        if: github.event_name == 'schedule'
        continue-on-error: true
        env:
          HKU_UID: ${{ secrets.HKU_UID }}
          HKU_PIN: ${{ secrets.HKU_PIN }}
        run: python run_scheduled.py

      - name: Commit updated bookings.json
        if: always() && github.event_name == 'schedule'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bookings.json
          git diff --staged --quiet || git commit -m "chore: update booking status [skip ci]"
          git push

      - name: Fail scheduled run if due booking failed
        if: github.event_name == 'schedule' && steps.scheduled.outcome == 'failure'
        run: exit 1

      # Manual run: book immediately with the provided inputs.
      - name: Book manual immediate request
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'book_now'
        env:
          HKU_UID: ${{ secrets.HKU_UID }}
          HKU_PIN: ${{ secrets.HKU_PIN }}
        run: |
          args=(
            python book.py
            --date "${{ inputs.date }}"
            --time "${{ inputs.time }}"
            --duration "${{ inputs.duration }}"
            --room-target "${{ inputs.room_target }}"
            --purpose "${{ inputs.purpose }}"
            --now
          )
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          "${args[@]}"

      # Manual run: queue a future booking in bookings.json.
      - name: Queue future booking
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'schedule_future'
        run: |
          python queue_booking.py \
            --date "${{ inputs.date }}" \
            --time "${{ inputs.time }}" \
            --duration "${{ inputs.duration }}" \
            --room-target "${{ inputs.room_target }}" \
            --purpose "${{ inputs.purpose }}"

      - name: Commit queued future booking
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'schedule_future'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bookings.json
          git diff --staged --quiet || git commit -m "chore: queue room booking [skip ci]"
          git push

      # Upload logs as an artifact visible in the Actions UI.
      - name: Upload booking log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-log-${{ github.run_id }}
          path: logs/bookings.log
          if-no-files-found: ignore
